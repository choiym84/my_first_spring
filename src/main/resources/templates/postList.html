<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <style>
        :root {
            --ink: #20201d;
            --muted: #777166;
            --paper: #fffaf0;
            --line: #e6dac2;
            --accent: #1f6f5b;
            --accent-dark: #164f41;
            --card: rgba(255, 250, 240, 0.88);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
            background:
                    radial-gradient(circle at 85% 10%, rgba(31, 111, 91, 0.18), transparent 28rem),
                    linear-gradient(135deg, #f4ead7 0%, #fffaf0 45%, #e8dcc8 100%);
        }

        .page {
            width: min(1040px, calc(100% - 32px));
            margin: 0 auto;
            padding: 56px 0;
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: end;
            gap: 20px;
            margin-bottom: 34px;
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(40px, 7vw, 78px);
            line-height: 0.9;
            letter-spacing: -0.06em;
        }

        .write-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            border-radius: 999px;
            padding: 0 22px;
            color: #fffaf0;
            font-weight: 700;
            text-decoration: none;
            background: var(--accent);
            box-shadow: 0 16px 30px rgba(31, 111, 91, 0.22);
            transition: background 160ms ease, transform 160ms ease;
        }

        .write-button:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 250, 240, 0.68);
        }

        .sort-label {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .sort-form {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sort-select {
            min-width: 156px;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 0 42px 0 16px;
            color: var(--ink);
            font: inherit;
            font-size: 14px;
            font-weight: 700;
            background: #fffdf8;
            cursor: pointer;
            outline: none;
        }

        .sort-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(31, 111, 91, 0.12);
        }

        .list {
            display: grid;
            gap: 14px;
        }

        .post-card {
            display: grid;
            grid-template-columns: 72px 1fr auto;
            gap: 18px;
            align-items: center;
            padding: 22px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--card);
            box-shadow: 0 18px 50px rgba(64, 49, 25, 0.1);
            backdrop-filter: blur(10px);
        }

        .post-id {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            color: var(--accent-dark);
            font-weight: 700;
            background: rgba(31, 111, 91, 0.12);
        }

        .post-title {
            margin: 0 0 8px;
            font-size: 24px;
            line-height: 1.2;
            letter-spacing: -0.03em;
        }

        .post-meta {
            margin: 0;
            color: var(--muted);
            font-size: 15px;
        }

        .post-date {
            color: var(--muted);
            font-size: 14px;
            white-space: nowrap;
        }

        .empty {
            padding: 44px;
            border: 1px dashed var(--line);
            border-radius: 24px;
            color: var(--muted);
            text-align: center;
            background: rgba(255, 250, 240, 0.62);
        }

        @media (max-width: 720px) {
            .hero,
            .post-card,
            .toolbar {
                grid-template-columns: 1fr;
            }

            .toolbar {
                align-items: flex-start;
                border-radius: 24px;
                flex-direction: column;
            }

            .post-date {
                white-space: normal;
            }

            .page {
                padding: 32px 0;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <header class="hero">
        <div>
            <p class="eyebrow">Board Archive</p>
            <h1>게시글 목록</h1>
        </div>
        <a class="write-button" href="/posts/new">새 글 작성</a>
    </header>

    <nav class="toolbar" aria-label="게시글 정렬">
        <p class="sort-label">
            현재 정렬:
            <strong th:text="${sort == 'id'} ? '아이디순' : '최신순'">최신순</strong>
        </p>
        <form class="sort-form" action="/posts" method="get">
            <label class="sort-label" for="sort">정렬</label>
            <select class="sort-select" id="sort" name="sort" onchange="this.form.submit()">
                <option value="latest" th:selected="${sort == null or sort == 'latest'}">최신순</option>
                <option value="id" th:selected="${sort == 'id'}">아이디순</option>
            </select>
        </form>
    </nav>

    <section class="list" th:if="${!#lists.isEmpty(posts)}">
        <article class="post-card" th:each="post : ${posts}">
            <span class="post-id" th:text="${post.id}">1</span>
            <div>
                <h2 class="post-title" th:text="${post.title}">제목</h2>
                <p class="post-meta">
                    작성자 <strong th:text="${post.writer}">작성자</strong>
                </p>
            </div>
            <time class="post-date" th:text="${post.createdAt}">작성일</time>
        </article>
    </section>

    <section class="empty" th:if="${#lists.isEmpty(posts)}">
        아직 작성된 게시글이 없습니다. 첫 글을 작성해보세요.
    </section>
</main>
</body>
</html>
